name: Auto Xiaomi Bootloader Unlocker

on:
  workflow_dispatch:  # Run manually only from the Actions tab

jobs:
  unlock:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Kill if it runs longer than 20 min

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ntplib pytz urllib3

      - name: Run Unlocker Bot
        env:
          XIAOMI_TOKEN: ${{ secrets.XIAOMI_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python -u hyperosunlocker.py
